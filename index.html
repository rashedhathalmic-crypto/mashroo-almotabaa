<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشروع المتابعة</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma;
}

body{
background:#eef2f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login{
background:white;
width:420px;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#1565c0;
margin-bottom:10px;
}

p{
text-align:center;
margin-bottom:30px;
color:#666;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
font-size:15px;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:14px;
background:#1565c0;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0d4e9d;
}

</style>

</head>

<body>

<div class="login">

<h1>📋 مشروع المتابعة</h1>

<p>نظام داخلي لإدارة ومتابعة المهام</p>

<input type="text" placeholder="اسم المستخدم">

<input type="password" placeholder="كلمة المرور">

<button onclick="alert('مرحباً بك')">

تسجيل الدخول

</button>

</div>

</body>

</html>
