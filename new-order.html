<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>أمر إنتاج جديد</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>أمر إنتاج جديد</h1>

<form id="orderForm" class="form">

<label>اسم العميل</label>
<input type="text" id="customer" required>

<label>نوع الزجاج</label>
<select id="glassType">
<option>BR6</option>
<option>BR7</option>
<option>STANAG 2</option>
<option>STANAG 3</option>
<option>STANAG 4</option>
</select>

<label>العرض (مم)</label>
<input type="number" id="width" required>

<label>الارتفاع (مم)</label>
<input type="number" id="height" required>

<label>الكمية</label>
<input type="number" id="qty" required>

<button type="submit">
💾 حفظ أمر الإنتاج
</button>

</form>

<script type="module" src="script.js"></script>

</body>

</html>
